services:
  db:
    image: mysql:8.0
    container_name: vgc-db
    environment:
      MYSQL_ROOT_PASSWORD: VgcPass123!
      MYSQL_DATABASE: VgcCollegeDb
    ports:
      - "3307:3306"
    volumes:
      - vgc-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pVgcPass123!"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vgc-app
    ports:
      - "8081:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=db;Port=3306;Database=VgcCollegeDb;User=root;Password=VgcPass123!;"
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      db:
        condition: service_healthy

volumes:
  vgc-db-data: